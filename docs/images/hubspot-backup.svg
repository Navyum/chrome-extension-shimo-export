<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0f1e"/>
  <rect width="1200" height="630" fill="url(#bgGrad)" opacity="0.8"/>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="50%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Decorative grid dots -->
  <g opacity="0.1">
    <circle cx="50" cy="50" r="1.5" fill="#fff"/>
    <circle cx="100" cy="50" r="1.5" fill="#fff"/>
    <circle cx="150" cy="50" r="1.5" fill="#fff"/>
    <circle cx="200" cy="50" r="1.5" fill="#fff"/>
    <circle cx="50" cy="100" r="1.5" fill="#fff"/>
    <circle cx="100" cy="100" r="1.5" fill="#fff"/>
    <circle cx="150" cy="100" r="1.5" fill="#fff"/>
    <circle cx="1000" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1050" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1150" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1000" cy="580" r="1.5" fill="#fff"/>
    <circle cx="1050" cy="580" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="580" r="1.5" fill="#fff"/>
    <circle cx="1150" cy="580" r="1.5" fill="#fff"/>
  </g>

  <!-- Left side: Cloud with warning (Risk) -->
  <g transform="translate(180, 180)">
    <!-- Cloud shape -->
    <path d="M80 180 C30 180 0 150 0 120 C0 90 20 65 50 55 C45 25 70 0 105 0 C140 0 165 25 165 55 C165 55 170 55 175 55 C210 55 230 80 230 110 C230 145 210 165 180 170 L180 180 Z"
          fill="url(#dangerGrad)" opacity="0.15" stroke="url(#dangerGrad)" stroke-width="2"/>

    <!-- Warning icon inside cloud -->
    <g transform="translate(85, 60)">
      <polygon points="30,5 55,55 5,55" fill="none" stroke="#f87171" stroke-width="3" filter="url(#glow)"/>
      <text x="30" y="48" text-anchor="middle" font-size="24" font-weight="bold" fill="#f87171">!</text>
    </g>

    <!-- Falling documents -->
    <g opacity="0.7">
      <rect x="60" y="200" width="35" height="45" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1.5" transform="rotate(-15 77 222)"/>
      <line x1="68" y1="212" x2="88" y2="208" stroke="#64748b" stroke-width="1.5"/>
      <line x1="68" y1="220" x2="85" y2="217" stroke="#64748b" stroke-width="1.5"/>
    </g>
    <g opacity="0.5">
      <rect x="140" y="220" width="35" height="45" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1.5" transform="rotate(10 157 242)"/>
      <line x1="148" y1="235" x2="168" y2="237" stroke="#64748b" stroke-width="1.5"/>
      <line x1="148" y1="243" x2="165" y2="244" stroke="#64748b" stroke-width="1.5"/>
    </g>
    <g opacity="0.3">
      <rect x="100" y="260" width="35" height="45" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1.5" transform="rotate(5 117 282)"/>
    </g>

    <!-- Red X marks -->
    <g filter="url(#glow)">
      <line x1="45" y1="210" x2="55" y2="220" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="55" y1="210" x2="45" y2="220" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <g filter="url(#glow)">
      <line x1="185" y1="235" x2="195" y2="245" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="195" y1="235" x2="185" y2="245" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Center: Arrow showing transition -->
  <g transform="translate(520, 290)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#667eea" stroke-width="3" stroke-dasharray="8 4" opacity="0.6"/>
    <polygon points="120,-8 140,0 120,8" fill="#667eea" opacity="0.8"/>
  </g>

  <!-- Right side: Shield with backup (Solution) -->
  <g transform="translate(720, 160)">
    <!-- Shield shape -->
    <path d="M120 10 L220 50 L220 140 C220 200 170 240 120 260 C70 240 20 200 20 140 L20 50 Z"
          fill="url(#shieldGrad)" opacity="0.12" stroke="url(#shieldGrad)" stroke-width="2.5"/>

    <!-- Checkmark inside shield -->
    <g transform="translate(80, 100)" filter="url(#glow)">
      <polyline points="10,25 30,45 70,5" fill="none" stroke="#4ade80" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Organized documents -->
    <g transform="translate(250, 50)">
      <!-- Folder -->
      <rect x="0" y="10" width="80" height="60" rx="4" fill="#1e293b" stroke="#4ade80" stroke-width="1.5" opacity="0.8"/>
      <rect x="0" y="5" width="35" height="10" rx="3" fill="#1e293b" stroke="#4ade80" stroke-width="1.5" opacity="0.8"/>
      <!-- Docs inside -->
      <rect x="10" y="25" width="25" height="32" rx="2" fill="#0f172a" stroke="#64748b" stroke-width="1"/>
      <rect x="18" y="30" width="25" height="32" rx="2" fill="#0f172a" stroke="#64748b" stroke-width="1"/>
      <rect x="26" y="35" width="25" height="32" rx="2" fill="#0f172a" stroke="#64748b" stroke-width="1"/>
    </g>

    <!-- 3-2-1 badges -->
    <g transform="translate(250, 140)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="#4ade80" opacity="0.2" stroke="#4ade80" stroke-width="1"/>
      <text x="15" y="21" text-anchor="middle" font-size="16" font-weight="bold" fill="#4ade80">3</text>

      <rect x="38" y="0" width="30" height="30" rx="6" fill="#667eea" opacity="0.2" stroke="#667eea" stroke-width="1"/>
      <text x="53" y="21" text-anchor="middle" font-size="16" font-weight="bold" fill="#667eea">2</text>

      <rect x="76" y="0" width="30" height="30" rx="6" fill="#a78bfa" opacity="0.2" stroke="#a78bfa" stroke-width="1"/>
      <text x="91" y="21" text-anchor="middle" font-size="16" font-weight="bold" fill="#a78bfa">1</text>
    </g>
    <text x="250" y="195" font-size="11" fill="#94a3b8" font-family="system-ui, sans-serif">备份策略</text>
  </g>

  <!-- Title text -->
  <text x="600" y="560" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">云文档备份：从风险到安全</text>
  <text x="600" y="595" text-anchor="middle" font-size="16" fill="#94a3b8" font-family="system-ui, sans-serif">5个真实案例 · 3-2-1备份策略 · 零数据丢失</text>

  <!-- Subtle decorative circles -->
  <circle cx="100" cy="500" r="80" fill="url(#dangerGrad)" opacity="0.03"/>
  <circle cx="1100" cy="130" r="100" fill="url(#shieldGrad)" opacity="0.03"/>
</svg>
