<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0f1e"/>
  <rect width="1200" height="630" fill="url(#bgGrad)" opacity="0.8"/>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#f87171" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#4ade80" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Decorative grid dots -->
  <g opacity="0.08">
    <circle cx="50" cy="50" r="1.5" fill="#fff"/>
    <circle cx="100" cy="50" r="1.5" fill="#fff"/>
    <circle cx="150" cy="50" r="1.5" fill="#fff"/>
    <circle cx="200" cy="50" r="1.5" fill="#fff"/>
    <circle cx="50" cy="100" r="1.5" fill="#fff"/>
    <circle cx="100" cy="100" r="1.5" fill="#fff"/>
    <circle cx="150" cy="100" r="1.5" fill="#fff"/>
    <circle cx="200" cy="100" r="1.5" fill="#fff"/>
    <circle cx="50" cy="150" r="1.5" fill="#fff"/>
    <circle cx="100" cy="150" r="1.5" fill="#fff"/>
    <circle cx="1000" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1050" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1150" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1000" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1050" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1150" cy="530" r="1.5" fill="#fff"/>
  </g>

  <!-- Left side: Problem - Document with warning (red glow) -->
  <g transform="translate(180, 140)" filter="url(#redGlow)">
    <!-- Document -->
    <rect x="40" y="20" width="120" height="155" rx="8" fill="#0f172a" stroke="#f87171" stroke-width="2.5"/>
    <!-- Document lines -->
    <line x1="60" y1="55" x2="140" y2="55" stroke="#f87171" stroke-width="1.5" opacity="0.4"/>
    <line x1="60" y1="75" x2="130" y2="75" stroke="#f87171" stroke-width="1.5" opacity="0.3"/>
    <line x1="60" y1="95" x2="135" y2="95" stroke="#f87171" stroke-width="1.5" opacity="0.3"/>
    <line x1="60" y1="115" x2="120" y2="115" stroke="#f87171" stroke-width="1.5" opacity="0.2"/>
    <!-- Warning triangle overlaid -->
    <g transform="translate(60, 120)">
      <polygon points="40,0 75,60 5,60" fill="none" stroke="#f87171" stroke-width="3"/>
      <text x="40" y="50" text-anchor="middle" font-size="28" font-weight="bold" fill="#f87171">!</text>
    </g>
    <!-- Red X marks -->
    <g opacity="0.7">
      <line x1="15" y1="50" x2="30" y2="65" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="30" y1="50" x2="15" y2="65" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <g opacity="0.5">
      <line x1="165" y1="30" x2="180" y2="45" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="180" y1="30" x2="165" y2="45" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Center: Dotted connection lines -->
  <g opacity="0.5">
    <!-- Lines from problem to solutions -->
    <line x1="420" y1="200" x2="580" y2="130" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4"/>
    <line x1="420" y1="240" x2="580" y2="230" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4"/>
    <line x1="420" y1="300" x2="580" y2="330" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4"/>
    <line x1="420" y1="350" x2="780" y2="130" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4"/>
    <line x1="420" y1="370" x2="780" y2="230" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4"/>
    <line x1="420" y1="400" x2="780" y2="330" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>

  <!-- Transition arrow -->
  <g transform="translate(460, 260)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#667eea" stroke-width="2.5" stroke-dasharray="6 4" opacity="0.7"/>
    <polygon points="75,-6 90,0 75,6" fill="#667eea" opacity="0.8"/>
  </g>

  <!-- Right side: Solution icons (green glow) -->
  <!-- Row 1 -->
  <!-- Key/Lock icon - Permission -->
  <g transform="translate(580, 100)" filter="url(#greenGlow)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
    <!-- Key shape -->
    <circle cx="25" cy="25" r="9" fill="none" stroke="#4ade80" stroke-width="2"/>
    <line x1="34" y1="25" x2="52" y2="25" stroke="#4ade80" stroke-width="2"/>
    <line x1="45" y1="25" x2="45" y2="33" stroke="#4ade80" stroke-width="2"/>
    <line x1="50" y1="25" x2="50" y2="30" stroke="#4ade80" stroke-width="2"/>
    <text x="30" y="53" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="system-ui, sans-serif">权限</text>
  </g>

  <!-- Browser icon - Compatibility -->
  <g transform="translate(680, 100)" filter="url(#greenGlow)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
    <!-- Browser window -->
    <rect x="12" y="12" width="36" height="28" rx="3" fill="none" stroke="#4ade80" stroke-width="1.5"/>
    <line x1="12" y1="20" x2="48" y2="20" stroke="#4ade80" stroke-width="1.5"/>
    <circle cx="17" cy="16" r="1.5" fill="#4ade80"/>
    <circle cx="22" cy="16" r="1.5" fill="#4ade80"/>
    <circle cx="27" cy="16" r="1.5" fill="#4ade80"/>
    <text x="30" y="53" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="system-ui, sans-serif">浏览器</text>
  </g>

  <!-- WiFi icon - Network -->
  <g transform="translate(780, 100)" filter="url(#greenGlow)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
    <!-- WiFi arcs -->
    <path d="M30 35 L30 35" stroke="#4ade80" stroke-width="2"/>
    <circle cx="30" cy="35" r="3" fill="#4ade80"/>
    <path d="M20 28 Q30 20 40 28" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
    <path d="M14 22 Q30 10 46 22" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
    <text x="30" y="53" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="system-ui, sans-serif">网络</text>
  </g>

  <!-- Row 2 -->
  <!-- File-type icon -->
  <g transform="translate(580, 200)" filter="url(#greenGlow)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <!-- File with type -->
    <rect x="16" y="10" width="28" height="34" rx="3" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <polyline points="34,10 34,18 44,18" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="30" y="36" text-anchor="middle" font-size="8" font-weight="bold" fill="#38bdf8" font-family="system-ui, sans-serif">TXT</text>
    <text x="30" y="53" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="system-ui, sans-serif">格式</text>
  </g>

  <!-- Size icon -->
  <g transform="translate(680, 200)" filter="url(#greenGlow)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <!-- Size indicator -->
    <rect x="15" y="15" width="30" height="24" rx="2" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
    <line x1="20" y1="32" x2="25" y2="25" stroke="#38bdf8" stroke-width="1.5"/>
    <line x1="25" y1="25" x2="30" y2="30" stroke="#38bdf8" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="35" y2="22" stroke="#38bdf8" stroke-width="1.5"/>
    <line x1="35" y1="22" x2="40" y2="28" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="30" y="53" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="system-ui, sans-serif">大小</text>
  </g>

  <!-- Checkmark icon - Success -->
  <g transform="translate(780, 200)" filter="url(#greenGlow)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
    <!-- Checkmark in circle -->
    <circle cx="30" cy="27" r="14" fill="none" stroke="#4ade80" stroke-width="2"/>
    <polyline points="22,27 28,33 38,21" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="30" y="53" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="system-ui, sans-serif">解决</text>
  </g>

  <!-- Row 3 - Additional solution icons -->
  <!-- Refresh/Retry icon -->
  <g transform="translate(580, 300)" filter="url(#greenGlow)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <!-- Circular arrow -->
    <path d="M20 27 A12 12 0 1 1 30 39" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <polygon points="27,37 30,43 24,42" fill="#fbbf24"/>
    <text x="30" y="53" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="system-ui, sans-serif">重试</text>
  </g>

  <!-- Settings/Gear icon -->
  <g transform="translate(680, 300)" filter="url(#greenGlow)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <!-- Gear -->
    <circle cx="30" cy="27" r="8" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="30" cy="27" r="3" fill="#fbbf24" opacity="0.5"/>
    <line x1="30" y1="15" x2="30" y2="19" stroke="#fbbf24" stroke-width="2.5"/>
    <line x1="30" y1="35" x2="30" y2="39" stroke="#fbbf24" stroke-width="2.5"/>
    <line x1="18" y1="27" x2="22" y2="27" stroke="#fbbf24" stroke-width="2.5"/>
    <line x1="38" y1="27" x2="42" y2="27" stroke="#fbbf24" stroke-width="2.5"/>
    <text x="30" y="53" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="system-ui, sans-serif">设置</text>
  </g>

  <!-- Update icon -->
  <g transform="translate(780, 300)" filter="url(#greenGlow)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <!-- Download/Update arrow -->
    <line x1="30" y1="14" x2="30" y2="34" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <polyline points="22,28 30,36 38,28" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="18" y1="38" x2="42" y2="38" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <text x="30" y="53" text-anchor="middle" font-size="8" fill="#94a3b8" font-family="system-ui, sans-serif">更新</text>
  </g>

  <!-- Problem label -->
  <text x="280" y="430" text-anchor="middle" font-size="14" fill="#f87171" font-family="system-ui, sans-serif" opacity="0.8">导出失败</text>

  <!-- Solution label -->
  <text x="710" y="400" text-anchor="middle" font-size="14" fill="#4ade80" font-family="system-ui, sans-serif" opacity="0.8">解决方案</text>

  <!-- Title text -->
  <text x="600" y="565" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">石墨文档导出问题排查</text>
  <text x="600" y="600" text-anchor="middle" font-size="16" fill="#94a3b8" font-family="system-ui, sans-serif">权限问题 · 浏览器兼容 · 网络超时 · 格式限制</text>

  <!-- Subtle decorative circles -->
  <circle cx="150" cy="480" r="90" fill="url(#redGrad)" opacity="0.03"/>
  <circle cx="1050" cy="120" r="110" fill="url(#greenGrad)" opacity="0.03"/>
</svg>
