<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0f1e"/>
  <rect width="1200" height="630" fill="url(#bgGrad)" opacity="0.8"/>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="flowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="amberGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#fbbf24" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#4ade80" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Decorative grid dots -->
  <g opacity="0.08">
    <circle cx="50" cy="50" r="1.5" fill="#fff"/>
    <circle cx="100" cy="50" r="1.5" fill="#fff"/>
    <circle cx="150" cy="50" r="1.5" fill="#fff"/>
    <circle cx="200" cy="50" r="1.5" fill="#fff"/>
    <circle cx="50" cy="100" r="1.5" fill="#fff"/>
    <circle cx="100" cy="100" r="1.5" fill="#fff"/>
    <circle cx="150" cy="100" r="1.5" fill="#fff"/>
    <circle cx="50" cy="150" r="1.5" fill="#fff"/>
    <circle cx="1000" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1050" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1150" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1000" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1050" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1150" cy="530" r="1.5" fill="#fff"/>
  </g>

  <!-- Left: Clock/Timer showing urgency (amber glow) -->
  <g transform="translate(140, 140)" filter="url(#amberGlow)">
    <!-- Clock face -->
    <circle cx="90" cy="90" r="70" fill="#0f172a" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="90" cy="90" r="65" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
    <!-- Clock hands -->
    <line x1="90" y1="90" x2="90" y2="45" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
    <line x1="90" y1="90" x2="120" y2="75" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="90" cy="90" r="5" fill="#fbbf24"/>
    <!-- Hour markers -->
    <line x1="90" y1="25" x2="90" y2="32" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
    <line x1="90" y1="148" x2="90" y2="155" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
    <line x1="25" y1="90" x2="32" y2="90" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
    <line x1="148" y1="90" x2="155" y2="90" stroke="#fbbf24" stroke-width="2" opacity="0.7"/>
    <!-- Urgency pulse rings -->
    <circle cx="90" cy="90" r="80" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.2" stroke-dasharray="4 4"/>
    <circle cx="90" cy="90" r="90" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.1"/>
    <!-- Time label -->
    <text x="90" y="200" text-anchor="middle" font-size="18" font-weight="bold" fill="#fbbf24" font-family="system-ui, sans-serif">24-72h</text>
  </g>

  <!-- Center: Cloud (office) with documents flowing out -->
  <g transform="translate(420, 120)">
    <!-- Cloud shape representing office -->
    <path d="M60 140 C20 140 0 115 0 90 C0 65 15 45 40 38 C35 15 55 0 80 0 C105 0 125 15 125 38 C128 37 132 37 135 38 C160 38 175 55 175 78 C175 105 160 120 140 125 L140 140 Z"
          fill="#0f172a" stroke="#667eea" stroke-width="2" opacity="0.9"/>
    <!-- Office label -->
    <text x="87" y="75" text-anchor="middle" font-size="12" fill="#667eea" font-family="system-ui, sans-serif" opacity="0.8">企业空间</text>

    <!-- Documents flying out of cloud -->
    <g opacity="0.8">
      <rect x="50" y="100" width="28" height="35" rx="3" fill="#1e293b" stroke="#667eea" stroke-width="1.2"/>
      <line x1="56" y1="112" x2="72" y2="112" stroke="#667eea" stroke-width="1" opacity="0.5"/>
      <line x1="56" y1="119" x2="70" y2="119" stroke="#667eea" stroke-width="1" opacity="0.4"/>
    </g>
    <g opacity="0.6">
      <rect x="85" y="105" width="28" height="35" rx="3" fill="#1e293b" stroke="#667eea" stroke-width="1.2"/>
      <line x1="91" y1="117" x2="107" y2="117" stroke="#667eea" stroke-width="1" opacity="0.5"/>
      <line x1="91" y1="124" x2="105" y2="124" stroke="#667eea" stroke-width="1" opacity="0.4"/>
    </g>
    <g opacity="0.5">
      <rect x="120" y="110" width="28" height="35" rx="3" fill="#1e293b" stroke="#667eea" stroke-width="1.2"/>
      <line x1="126" y1="122" x2="142" y2="122" stroke="#667eea" stroke-width="1" opacity="0.5"/>
    </g>
  </g>

  <!-- Flow arrow from cloud to shield -->
  <g transform="translate(600, 220)">
    <!-- Flowing documents along path -->
    <path d="M0 40 C60 40 100 30 180 30" fill="none" stroke="url(#flowGrad)" stroke-width="3" stroke-dasharray="8 5" opacity="0.7"/>
    <!-- Arrow head -->
    <polygon points="175,22 195,30 175,38" fill="#4ade80" opacity="0.8"/>
    <!-- Small docs along the path -->
    <rect x="40" y="25" width="18" height="22" rx="2" fill="#1e293b" stroke="#a78bfa" stroke-width="1" opacity="0.6" transform="rotate(-5 49 36)"/>
    <rect x="90" y="18" width="18" height="22" rx="2" fill="#1e293b" stroke="#667eea" stroke-width="1" opacity="0.5" transform="rotate(3 99 29)"/>
    <rect x="140" y="15" width="18" height="22" rx="2" fill="#1e293b" stroke="#4ade80" stroke-width="1" opacity="0.6" transform="rotate(-2 149 26)"/>
  </g>

  <!-- Right: Shield/Safe (personal backup) with green glow -->
  <g transform="translate(820, 120)" filter="url(#greenGlow)">
    <!-- Shield shape -->
    <path d="M90 10 L170 45 L170 130 C170 180 130 215 90 230 C50 215 10 180 10 130 L10 45 Z"
          fill="#0f172a" stroke="#4ade80" stroke-width="2.5"/>
    <!-- Inner shield detail -->
    <path d="M90 30 L155 58 L155 125 C155 168 123 198 90 210 C57 198 25 168 25 125 L25 58 Z"
          fill="none" stroke="#4ade80" stroke-width="1" opacity="0.3"/>
    <!-- Checkmark inside shield -->
    <polyline points="65,120 82,137 115,100" fill="none" stroke="#4ade80" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Lock icon at top of shield -->
    <rect x="75" y="55" width="30" height="24" rx="4" fill="none" stroke="#4ade80" stroke-width="2"/>
    <path d="M82 55 L82 47 C82 40 90 35 98 40 L98 55" fill="none" stroke="#4ade80" stroke-width="2"/>
    <circle cx="90" cy="67" r="3" fill="#4ade80"/>
    <!-- Personal backup label -->
    <text x="90" y="260" text-anchor="middle" font-size="12" fill="#4ade80" font-family="system-ui, sans-serif" opacity="0.8">安全归档</text>
  </g>

  <!-- Bottom: Batch export progress indicator -->
  <g transform="translate(300, 420)">
    <!-- Progress bar background -->
    <rect x="0" y="0" width="600" height="8" rx="4" fill="#1e293b"/>
    <!-- Progress bar fill -->
    <rect x="0" y="0" width="480" height="8" rx="4" fill="url(#flowGrad)" opacity="0.8"/>
    <!-- Progress percentage -->
    <text x="610" y="8" font-size="14" font-weight="bold" fill="#4ade80" font-family="system-ui, sans-serif">80%</text>
    <!-- File count -->
    <text x="300" y="30" text-anchor="middle" font-size="11" fill="#94a3b8" font-family="system-ui, sans-serif">已导出 156/195 个文件</text>
  </g>

  <!-- Urgency indicators -->
  <g transform="translate(140, 400)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="1"/>
    <text x="50" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#fbbf24" font-family="system-ui, sans-serif">时间紧迫</text>
  </g>

  <!-- Title text -->
  <text x="600" y="565" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">离职前文档备份指南</text>
  <text x="600" y="600" text-anchor="middle" font-size="16" fill="#94a3b8" font-family="system-ui, sans-serif">时间紧迫 · 批量导出 · 安全归档 · 零遗漏</text>

  <!-- Subtle decorative circles -->
  <circle cx="150" cy="500" r="80" fill="url(#amberGrad)" opacity="0.03"/>
  <circle cx="1050" cy="100" r="100" fill="url(#greenGrad)" opacity="0.03"/>
</svg>
