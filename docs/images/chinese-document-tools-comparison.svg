  <rect x="1020" y="60" width="20" height="20" rx="2" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.15" transform="rotate(45, 1030, 70)"/>
  <circle cx="170" cy="460" r="12" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.12"/>
  <circle cx="1040" cy="460" r="12" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.12"/>

  <!-- Title -->
  <text x="600" y="568" font-family="system-ui" font-size="27" fill="white" text-anchor="middle" font-weight="600">2026 国产在线文档工具对比</text>
  <!-- Subtitle -->
  <text x="600" y="600" font-family="system-ui" font-size="15" fill="#94a3b8" text-anchor="middle">石墨 vs 飞书 vs 腾讯 vs 语雀</text>
