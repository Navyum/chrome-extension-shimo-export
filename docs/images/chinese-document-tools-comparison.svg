      <circle cx="14" cy="11" r="5" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.6"/>
      <line x1="14" y1="6" x2="14" y2="16" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
