<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0f1e"/>
  <rect width="1200" height="630" fill="url(#bgGrad)" opacity="0.8"/>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="40%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="safeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Decorative grid dots -->
  <g opacity="0.08">
    <circle cx="50" cy="50" r="1.5" fill="#fff"/>
    <circle cx="100" cy="50" r="1.5" fill="#fff"/>
    <circle cx="150" cy="50" r="1.5" fill="#fff"/>
    <circle cx="200" cy="50" r="1.5" fill="#fff"/>
    <circle cx="250" cy="50" r="1.5" fill="#fff"/>
    <circle cx="50" cy="100" r="1.5" fill="#fff"/>
    <circle cx="100" cy="100" r="1.5" fill="#fff"/>
    <circle cx="150" cy="100" r="1.5" fill="#fff"/>
    <circle cx="950" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1000" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1050" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1150" cy="530" r="1.5" fill="#fff"/>
    <circle cx="950" cy="580" r="1.5" fill="#fff"/>
    <circle cx="1000" cy="580" r="1.5" fill="#fff"/>
    <circle cx="1050" cy="580" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="580" r="1.5" fill="#fff"/>
    <circle cx="1150" cy="580" r="1.5" fill="#fff"/>
  </g>

  <!-- Central cracked cloud -->
  <g transform="translate(440, 60)">
    <!-- Cloud shape with crack -->
    <path d="M160 200 C80 200 30 165 30 125 C30 85 60 55 100 45 C95 15 130 -15 175 -15 C220 -15 255 15 255 50 C260 48 270 48 280 50 C320 55 345 80 345 115 C345 155 320 180 285 185 L280 200 Z"
          fill="url(#cloudGrad)" opacity="0.12" stroke="url(#cloudGrad)" stroke-width="2"/>

    <!-- Crack lines through cloud -->
    <g filter="url(#glow)" opacity="0.8">
      <polyline points="175,30 168,60 180,75 170,100 178,130 165,160"
                fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="170,100 155,110 148,130"
                fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
      <polyline points="178,130 192,140 198,160"
                fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Glowing warning in cloud center -->
    <g transform="translate(145, 55)" filter="url(#glow)">
      <polygon points="25,0 48,40 2,40" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
      <text x="25" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#fbbf24">!</text>
    </g>
  </g>

  <!-- 5 Case Icons - arranged in arc below cloud -->

  <!-- Case 1: Account Locked (lock icon) -->
  <g transform="translate(120, 280)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#1e293b" opacity="0.6" stroke="#475569" stroke-width="1"/>
    <!-- Lock body -->
    <rect x="48" y="65" width="44" height="35" rx="5" fill="none" stroke="#f87171" stroke-width="2.5" filter="url(#glow)"/>
    <!-- Lock shackle -->
    <path d="M55 65 L55 50 C55 37 65 28 70 28 C75 28 85 37 85 50 L85 65" fill="none" stroke="#f87171" stroke-width="2.5"/>
    <!-- Keyhole -->
    <circle cx="70" cy="78" r="4" fill="#f87171"/>
    <rect x="68" y="80" width="4" height="8" fill="#f87171"/>
    <!-- Label -->
    <text x="70" y="125" text-anchor="middle" font-size="12" fill="#94a3b8" font-family="system-ui, sans-serif">账号被封</text>
    <!-- Number badge -->
    <circle cx="120" cy="20" r="14" fill="#dc2626" opacity="0.9"/>
    <text x="120" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="system-ui, sans-serif">1</text>
  </g>

  <!-- Case 2: Accidental Delete (trash icon) -->
  <g transform="translate(310, 310)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#1e293b" opacity="0.6" stroke="#475569" stroke-width="1"/>
    <!-- Trash can -->
    <rect x="50" y="60" width="40" height="45" rx="3" fill="none" stroke="#fb923c" stroke-width="2.5" filter="url(#glow)"/>
    <line x1="45" y1="58" x2="95" y2="58" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="62" y="50" width="16" height="8" rx="2" fill="none" stroke="#fb923c" stroke-width="2"/>
    <!-- Delete lines -->
    <line x1="60" y1="70" x2="60" y2="95" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="70" y1="70" x2="70" y2="95" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="80" y1="70" x2="80" y2="95" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Label -->
    <text x="70" y="125" text-anchor="middle" font-size="12" fill="#94a3b8" font-family="system-ui, sans-serif">误删文件</text>
    <!-- Number badge -->
    <circle cx="120" cy="20" r="14" fill="#ea580c" opacity="0.9"/>
    <text x="120" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="system-ui, sans-serif">2</text>
  </g>

  <!-- Case 3: Service Shutdown (power off icon) -->
  <g transform="translate(500, 330)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#1e293b" opacity="0.6" stroke="#475569" stroke-width="1"/>
    <!-- Power icon -->
    <circle cx="70" cy="72" r="22" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="90 30" filter="url(#glow)"/>
    <line x1="70" y1="48" x2="70" y2="72" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <!-- Offline indicator -->
    <line x1="52" y1="100" x2="88" y2="100" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 3"/>
    <!-- Label -->
    <text x="70" y="125" text-anchor="middle" font-size="12" fill="#94a3b8" font-family="system-ui, sans-serif">服务停运</text>
    <!-- Number badge -->
    <circle cx="120" cy="20" r="14" fill="#7c3aed" opacity="0.9"/>
    <text x="120" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="system-ui, sans-serif">3</text>
  </g>

  <!-- Case 4: Version Conflict (sync arrows with X) -->
  <g transform="translate(690, 310)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#1e293b" opacity="0.6" stroke="#475569" stroke-width="1"/>
    <!-- Sync arrows -->
    <path d="M50 65 C50 50 90 50 90 65" fill="none" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow)"/>
    <polygon points="90,60 95,67 85,67" fill="#38bdf8"/>
    <path d="M90 85 C90 100 50 100 50 85" fill="none" stroke="#38bdf8" stroke-width="2.5"/>
    <polygon points="50,90 45,83 55,83" fill="#38bdf8"/>
    <!-- X over arrows -->
    <g filter="url(#glow)">
      <line x1="60" y1="65" x2="80" y2="85" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
      <line x1="80" y1="65" x2="60" y2="85" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Label -->
    <text x="70" y="125" text-anchor="middle" font-size="12" fill="#94a3b8" font-family="system-ui, sans-serif">版本覆盖</text>
    <!-- Number badge -->
    <circle cx="120" cy="20" r="14" fill="#0284c7" opacity="0.9"/>
    <text x="120" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="system-ui, sans-serif">4</text>
  </g>

  <!-- Case 5: Permission Lost (shield broken) -->
  <g transform="translate(880, 280)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#1e293b" opacity="0.6" stroke="#475569" stroke-width="1"/>
    <!-- Shield outline -->
    <path d="M70 45 L95 55 L95 80 C95 100 83 110 70 115 C57 110 45 100 45 80 L45 55 Z"
          fill="none" stroke="#fbbf24" stroke-width="2.5" filter="url(#glow)"/>
    <!-- Broken line through shield -->
    <line x1="55" y1="65" x2="85" y2="95" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Slash marks -->
    <line x1="60" y1="90" x2="65" y2="80" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="75" y1="70" x2="80" y2="60" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Label -->
    <text x="70" y="125" text-anchor="middle" font-size="12" fill="#94a3b8" font-family="system-ui, sans-serif">权限丢失</text>
    <!-- Number badge -->
    <circle cx="120" cy="20" r="14" fill="#ca8a04" opacity="0.9"/>
    <text x="120" y="25" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff" font-family="system-ui, sans-serif">5</text>
  </g>

  <!-- Connecting lines from cloud to cases -->
  <g opacity="0.3">
    <line x1="520" y1="250" x2="190" y2="280" stroke="#f87171" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="560" y1="255" x2="380" y2="310" stroke="#fb923c" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="600" y1="260" x2="570" y2="330" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="650" y1="255" x2="760" y2="310" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="690" y1="250" x2="950" y2="280" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- Falling document particles -->
  <g opacity="0.4">
    <rect x="350" y="240" width="16" height="20" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1" transform="rotate(-20 358 250)"/>
    <rect x="780" y="230" width="14" height="18" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1" transform="rotate(15 787 239)"/>
    <rect x="250" y="220" width="12" height="16" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1" transform="rotate(-10 256 228)"/>
    <rect x="900" y="240" width="14" height="18" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1" transform="rotate(25 907 249)"/>
  </g>

  <!-- Bottom solution hint -->
  <g transform="translate(430, 500)">
    <rect x="0" y="0" width="340" height="44" rx="22" fill="#4ade80" opacity="0.08" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6 3"/>
    <!-- Shield mini icon -->
    <path d="M30 12 L42 16 L42 28 C42 34 36 38 30 40 C24 38 18 34 18 28 L18 16 Z"
          fill="none" stroke="#4ade80" stroke-width="1.5"/>
    <polyline points="24,26 28,30 36,20" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/>
    <text x="56" y="27" font-size="14" fill="#4ade80" font-family="system-ui, sans-serif">备份方案 → 避开所有数据丢失陷阱</text>
  </g>

  <!-- Title text -->
  <text x="600" y="575" text-anchor="middle" font-size="26" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">5个真实案例：云文档数据丢失全解析</text>
  <text x="600" y="608" text-anchor="middle" font-size="14" fill="#64748b" font-family="system-ui, sans-serif">账号被封 · 误删文件 · 服务停运 · 版本覆盖 · 权限丢失</text>

  <!-- Subtle ambient circles -->
  <circle cx="80" cy="450" r="100" fill="url(#dangerGrad)" opacity="0.02"/>
  <circle cx="1120" cy="180" r="120" fill="url(#cloudGrad)" opacity="0.03"/>
  <circle cx="600" cy="100" r="80" fill="url(#warnGrad)" opacity="0.02"/>
</svg>
