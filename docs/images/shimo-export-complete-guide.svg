<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0f1e"/>
  <rect width="1200" height="630" fill="url(#bgGrad)" opacity="0.8"/>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Decorative grid dots -->
  <g opacity="0.08">
    <circle cx="50" cy="50" r="1.5" fill="#fff"/>
    <circle cx="100" cy="50" r="1.5" fill="#fff"/>
    <circle cx="150" cy="50" r="1.5" fill="#fff"/>
    <circle cx="200" cy="50" r="1.5" fill="#fff"/>
    <circle cx="250" cy="50" r="1.5" fill="#fff"/>
    <circle cx="50" cy="100" r="1.5" fill="#fff"/>
    <circle cx="100" cy="100" r="1.5" fill="#fff"/>
    <circle cx="150" cy="100" r="1.5" fill="#fff"/>
    <circle cx="200" cy="100" r="1.5" fill="#fff"/>
    <circle cx="50" cy="150" r="1.5" fill="#fff"/>
    <circle cx="100" cy="150" r="1.5" fill="#fff"/>
    <circle cx="950" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1000" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1050" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1150" cy="480" r="1.5" fill="#fff"/>
    <circle cx="1000" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1050" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1150" cy="530" r="1.5" fill="#fff"/>
    <circle cx="1050" cy="580" r="1.5" fill="#fff"/>
    <circle cx="1100" cy="580" r="1.5" fill="#fff"/>
    <circle cx="1150" cy="580" r="1.5" fill="#fff"/>
  </g>

  <!-- Central document icon -->
  <g transform="translate(540, 180)" filter="url(#glow)">
    <!-- Main document -->
    <rect x="0" y="0" width="120" height="150" rx="8" fill="#0f172a" stroke="#667eea" stroke-width="2.5" opacity="0.9"/>
    <!-- Document lines -->
    <line x1="20" y1="35" x2="100" y2="35" stroke="#667eea" stroke-width="2" opacity="0.6"/>
    <line x1="20" y1="55" x2="90" y2="55" stroke="#667eea" stroke-width="2" opacity="0.4"/>
    <line x1="20" y1="75" x2="95" y2="75" stroke="#667eea" stroke-width="2" opacity="0.4"/>
    <line x1="20" y1="95" x2="80" y2="95" stroke="#667eea" stroke-width="2" opacity="0.3"/>
    <line x1="20" y1="115" x2="85" y2="115" stroke="#667eea" stroke-width="2" opacity="0.3"/>
    <!-- Export symbol -->
    <polygon points="60,10 70,20 65,20 65,28 55,28 55,20 50,20" fill="#667eea" opacity="0.8"/>
  </g>

  <!-- Radiating arrows to format icons -->
  <!-- Arrow to MD (top) -->
  <g filter="url(#glow)">
    <line x1="600" y1="180" x2="600" y2="100" stroke="#667eea" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <polygon points="594,105 600,90 606,105" fill="#667eea" opacity="0.8"/>
  </g>
  <!-- MD icon -->
  <g transform="translate(570, 45)">
    <rect x="0" y="0" width="60" height="40" rx="6" fill="#0f172a" stroke="#667eea" stroke-width="1.5"/>
    <text x="30" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#667eea" font-family="system-ui, sans-serif">MD</text>
  </g>

  <!-- Arrow to PDF (top-right) -->
  <g filter="url(#glow)">
    <line x1="660" y1="200" x2="750" y2="130" stroke="#f87171" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <polygon points="744,125 758,122 748,135" fill="#f87171" opacity="0.8"/>
  </g>
  <!-- PDF icon -->
  <g transform="translate(750, 70)">
    <rect x="0" y="0" width="60" height="40" rx="6" fill="#0f172a" stroke="#f87171" stroke-width="1.5"/>
    <text x="30" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#f87171" font-family="system-ui, sans-serif">PDF</text>
  </g>

  <!-- Arrow to DOC (right) -->
  <g filter="url(#glow)">
    <line x1="660" y1="260" x2="780" y2="260" stroke="#38bdf8" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <polygon points="775,254 790,260 775,266" fill="#38bdf8" opacity="0.8"/>
  </g>
  <!-- DOC icon -->
  <g transform="translate(795, 240)">
    <rect x="0" y="0" width="60" height="40" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="30" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#38bdf8" font-family="system-ui, sans-serif">DOC</text>
  </g>

  <!-- Arrow to XLS (bottom-right) -->
  <g filter="url(#glow)">
    <line x1="650" y1="330" x2="740" y2="380" stroke="#4ade80" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <polygon points="734,385 748,388 738,375" fill="#4ade80" opacity="0.8"/>
  </g>
  <!-- XLS icon -->
  <g transform="translate(740, 380)">
    <rect x="0" y="0" width="60" height="40" rx="6" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
    <text x="30" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#4ade80" font-family="system-ui, sans-serif">XLS</text>
  </g>

  <!-- Arrow to PPT (bottom) -->
  <g filter="url(#glow)">
    <line x1="600" y1="330" x2="600" y2="400" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <polygon points="594,395 600,410 606,395" fill="#fbbf24" opacity="0.8"/>
  </g>
  <!-- PPT icon -->
  <g transform="translate(570, 415)">
    <rect x="0" y="0" width="60" height="40" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="30" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#fbbf24" font-family="system-ui, sans-serif">PPT</text>
  </g>

  <!-- Arrow to JPG (bottom-left) -->
  <g filter="url(#glow)">
    <line x1="540" y1="320" x2="450" y2="380" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <polygon points="456,385 442,388 452,375" fill="#a78bfa" opacity="0.8"/>
  </g>
  <!-- JPG icon -->
  <g transform="translate(390, 380)">
    <rect x="0" y="0" width="60" height="40" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="30" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#a78bfa" font-family="system-ui, sans-serif">JPG</text>
  </g>

  <!-- Arrow to XMIND (left) -->
  <g filter="url(#glow)">
    <line x1="540" y1="255" x2="420" y2="255" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <polygon points="425,249 410,255 425,261" fill="#fbbf24" opacity="0.8"/>
  </g>
  <!-- XMIND icon -->
  <g transform="translate(330, 235)">
    <rect x="0" y="0" width="75" height="40" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="37" y="26" text-anchor="middle" font-size="12" font-weight="bold" fill="#fbbf24" font-family="system-ui, sans-serif">XMIND</text>
  </g>

  <!-- Arrow to top-left -->
  <g filter="url(#glow)">
    <line x1="540" y1="200" x2="450" y2="130" stroke="#4ade80" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
    <polygon points="456,125 442,122 452,135" fill="#4ade80" opacity="0.8"/>
  </g>
  <!-- Folder icon top-left -->
  <g transform="translate(390, 80)">
    <rect x="0" y="10" width="55" height="38" rx="4" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
    <rect x="0" y="5" width="25" height="10" rx="3" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
    <text x="27" y="36" text-anchor="middle" font-size="9" fill="#4ade80" font-family="system-ui, sans-serif">批量</text>
  </g>

  <!-- Guide journey progress bar -->
  <g transform="translate(200, 470)">
    <rect x="0" y="0" width="800" height="6" rx="3" fill="#1e293b"/>
    <rect x="0" y="0" width="800" height="6" rx="3" fill="url(#pathGrad)" opacity="0.7"/>
    <!-- Step dots -->
    <circle cx="0" cy="3" r="8" fill="#0f172a" stroke="#667eea" stroke-width="2"/>
    <circle cx="0" cy="3" r="4" fill="#667eea"/>
    <circle cx="267" cy="3" r="8" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="267" cy="3" r="4" fill="#a78bfa"/>
    <circle cx="533" cy="3" r="8" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="533" cy="3" r="4" fill="#38bdf8"/>
    <circle cx="800" cy="3" r="8" fill="#0f172a" stroke="#4ade80" stroke-width="2"/>
    <circle cx="800" cy="3" r="4" fill="#4ade80"/>
    <!-- Step labels -->
    <text x="0" y="30" text-anchor="middle" font-size="11" fill="#94a3b8" font-family="system-ui, sans-serif">格式选择</text>
    <text x="267" y="30" text-anchor="middle" font-size="11" fill="#94a3b8" font-family="system-ui, sans-serif">批量导出</text>
    <text x="533" y="30" text-anchor="middle" font-size="11" fill="#94a3b8" font-family="system-ui, sans-serif">问题排查</text>
    <text x="800" y="30" text-anchor="middle" font-size="11" fill="#94a3b8" font-family="system-ui, sans-serif">场景策略</text>
  </g>

  <!-- Title text -->
  <text x="600" y="565" text-anchor="middle" font-size="28" font-weight="bold" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">石墨文档导出完全指南</text>
  <text x="600" y="600" text-anchor="middle" font-size="16" fill="#94a3b8" font-family="system-ui, sans-serif">格式选择 · 批量导出 · 问题排查 · 场景策略</text>

  <!-- Subtle decorative circles -->
  <circle cx="120" cy="450" r="100" fill="url(#purpleGrad)" opacity="0.03"/>
  <circle cx="1080" cy="150" r="120" fill="url(#blueGrad)" opacity="0.03"/>
</svg>
